name: Update README packages

on:
  pull_request:
    paths:
      - '.github/workflows/update-readme-packages.yml'
      - 'composer.json'
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}

      - name: Update package lists in README.md
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            let readme = fs.readFileSync('README.md', 'utf8');
            const composer = JSON.parse(fs.readFileSync('composer.json', 'utf8'));
            const sections = {
              require: 'Package dependencies installed automatically.',
              suggest: 'Some features require additional packages.',
            };

            async function getPackageInfo(name) {
              const [owner, repo] = name.split('/');

              try {
                const {data} = await github.rest.repos.get({owner, repo});

                return {
                  url: `https://github.com/${name}`,
                  description: data.description ?? null,
                };
              } catch {}

              try {
                const response = await fetch(`https://packagist.org/packages/${name}.json`);
                const data = await response.json();

                return {
                  url: `https://packagist.org/packages/${name}`,
                  description: data.package?.description ?? null,
                };
              } catch {}

              return {
                url: `https://packagist.org/packages/${name}`,
                description: null,
              };
            }

            async function buildList(packages) {
              const items = [];

              for (const [name, version] of Object.entries(packages)) {
                if (!name.includes('/')) {
                  continue;
                }

                const {url, description} = await getPackageInfo(name);
                items.push(`- [${name}](${url}): \`${version}\`${description ? ' — ' + description : ''}`);
              }

              return items.length ? '\n\n' + items.join('\n') + '\n' : null;
            }

            function ensureDetailsExists(readme, section) {
              if (readme.includes(`<details id="${section}">`)) {
                return readme;
              }

              const details = `\n<details id="${section}">\n<summary>${sections[section]}</summary>\n</details>\n`;
              // Insert at the end of section "## Installation"
              return readme.replace(/(## Installation.*?)(\n## |$)/s, `$1${details}$2`);
            }

            for (const section in sections) {
              const packages = composer[section] ?? {};
              const content = await buildList(packages);

              if (content) {
                readme = ensureDetailsExists(readme, section);
                const pattern = new RegExp(`(<details id="${section}">.*?<\\/summary>).*?(<\\/details>)`, 's');
                readme = readme.replace(pattern, `$1${content}$2`);
              } else {
                const pattern = new RegExp(`<details id="${section}">.*?<\\/details>\\n{0,2}`, 's');
                readme = readme.replace(pattern, '');
              }
            }

            fs.writeFileSync('README.md', readme);
            console.log('README.md updated successfully');

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (
            git add README.md
            git commit -m "Update package lists in README.md"
            git push
          )
