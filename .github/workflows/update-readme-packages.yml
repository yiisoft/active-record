name: Update README packages

on:
  pull_request_target:
    paths:
      - '.github/workflows/update-readme-packages.yml'
      - 'composer.json'

permissions:
  contents: read

jobs:
  update-readme:
    uses: yiisoft/actions/.github/workflows/update-readme-packages.yml@update-readme-packages
    secrets:
      TOKEN: ${{ secrets.YIISOFT_GITHUB_TOKEN }}
