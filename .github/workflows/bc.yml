on:
  pull_request:
    paths: &paths
      - 'src/**'
      - '.github/workflows/bc.yml'
      - 'composer.json'
      - '.roave-backward-compatibility-check.xml'
  push:
    branches: ['master']
    paths: *paths

name: backwards compatibility

permissions:
  contents: read

jobs:
  roave_bc_check:
    uses: yiisoft/actions/.github/workflows/bc.yml@ab62d6b3b0e0cff6c9724ec5a395bedb41c639a2
    with:
      php: >-
        ['8.5']
